<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>World Conquer FREE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; text-align:center;}
#map { height:55vh;}
button { padding:10px; margin:10px; background:limegreen; border:none; border-radius:8px;}
</style>
</head>

<body>

<h2>🌍 World Conquer FREE</h2>

<div id="map"></div>

<p>🟩 Gebiete: <span id="tiles">0</span></p>
<p>⭐ Level: <span id="level">1</span> | XP: <span id="xp">0</span></p>

<button onclick="startTracking()">Start</button>

<div id="leaderboard"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// USER ID
let userId = localStorage.getItem("userId");
if (!userId){
  userId = "user_" + Math.random().toString(36).substr(2,9);
  localStorage.setItem("userId", userId);
}

// MAP
let map = L.map('map').setView([53.55,10.0],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const TILE_SIZE = 0.001;

let visitedTiles = JSON.parse(localStorage.getItem("tiles")) || {};
let drawnTiles = {};
let xp = Number(localStorage.getItem("xp")) || 0;

// TILE
function getTile(lat,lon){
  return Math.floor(lat/TILE_SIZE)+"_"+Math.floor(lon/TILE_SIZE);
}

function drawTile(tile,color){
  if (drawnTiles[tile]) return;

  let [x,y]=tile.split("_").map(Number);

  let bounds=[
    [x*TILE_SIZE,y*TILE_SIZE],
    [(x+1)*TILE_SIZE,(y+1)*TILE_SIZE]
  ];

  drawnTiles[tile]=L.rectangle(bounds,{
    color:color,
    fillOpacity:0.4
  }).addTo(map);
}

// LOAD OWN TILES
Object.keys(visitedTiles).forEach(t => drawTile(t,"lime"));

// SAVE LOCAL (fix für dein Problem!)
function saveLocal(){
  localStorage.setItem("tiles", JSON.stringify(visitedTiles));
  localStorage.setItem("xp", xp);
}

// CLAIM TILE
function claimTile(tile){
  if (!visitedTiles[tile]){
    visitedTiles[tile]=true;
    xp += 10;
    drawTile(tile,"lime");
    saveLocal();
    updateUI();
  }
}

// UI
function updateUI(){
  let count = Object.keys(visitedTiles).length;
  document.getElementById("tiles").innerText = count;
  document.getElementById("xp").innerText = xp;
  document.getElementById("level").innerText = Math.floor(xp/100)+1;
}

// TRACKING
function track(pos){
  let lat = pos.coords.latitude;
  let lon = pos.coords.longitude;

  let tile = getTile(lat,lon);
  claimTile(tile);

  map.setView([lat,lon]);
}

function startTracking(){
  navigator.geolocation.watchPosition(track);
}

// 🔥 ANDERE SPIELER LADEN (GitHub JSON)
async function loadOthers(){
  try {
    let res = await fetch("data.json");
    let data = await res.json();

    Object.entries(data).forEach(([player,tiles])=>{
      if (player !== userId){
        tiles.forEach(t => drawTile(t,"red"));
      }
    });

    // Leaderboard
    let sorted = Object.entries(data)
      .map(([p,t])=>[p,t.length])
      .sort((a,b)=>b[1]-a[1])
      .slice(0,5);

    let html = "<h3>🏆 Top Spieler</h3>";
    sorted.forEach((p,i)=>{
      html += `<p>${i+1}. ${p[0]}: ${p[1]}</p>`;
    });

    document.getElementById("leaderboard").innerHTML = html;

  } catch(e){
    console.log("Noch keine Daten online");
  }
}

// 🔥 UPLOAD (manuell klicken nötig wegen GitHub)
async function uploadData(){
  alert("Du musst data.json manuell updaten (GitHub limitation)");
}

// Lade andere alle 30s
setInterval(loadOthers,30000);
loadOthers();

updateUI();
</script>

</body>
</html>
